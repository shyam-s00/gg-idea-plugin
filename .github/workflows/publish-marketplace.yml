name: Publish to JetBrains Marketplace

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v2.9.9 or v2.9.9-beta)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Extract version and channel
        id: release_info
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

          # Determine channel: if version contains a hyphen (e.g. 1.0.0-beta, 1.0.0-rc1)
          # use the part after the hyphen as the channel, otherwise use "default" (stable)
          if [[ "$VERSION" == *-* ]]; then
            CHANNEL=$(echo "$VERSION" | cut -d'-' -f2 | cut -d'.' -f1)
            echo "CHANNEL=$CHANNEL" >> $GITHUB_OUTPUT
          else
            echo "CHANNEL=default" >> $GITHUB_OUTPUT
          fi

      - name: Build Plugin
        run: ./gradlew buildPlugin -PpluginVersion=${{ steps.release_info.outputs.VERSION }} --no-daemon

      - name: Publish Plugin to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}
        run: ./gradlew publishPlugin -PpluginVersion=${{ steps.release_info.outputs.VERSION }} -PpluginChannel=${{ steps.release_info.outputs.CHANNEL }} --no-daemon

