name: Release JetBrains Plugin

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  verify:
    name: Verify Plugin
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ide: 
          - IC # IDEA Community
          - PC # PyCharm Community
          - RD # Rider
          - GO # GoLand
          - WS # WebStorm
          - PS # PhpStorm
          - RM # RubyMine

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free up disk space on GitHub runner
        run: |
          echo "Freeing up disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force
          sudo apt-get clean
          echo "Disk space after cleanup:"
          df -h

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Use the tag name for the version, stripping the 'v' prefix
      - name: Extract version
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and Verify Plugin (${{ matrix.ide }})
        env:
          ORG_GRADLE_PROJECT_pluginVerificationIde: ${{ matrix.ide }}
        run: ./gradlew verifyPlugin -PpluginVersion=${{ steps.extract_version.outputs.VERSION }} --no-daemon

  release:
    name: Upload Release Artifact
    needs: verify
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Extract version and channel
        id: release_info
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          
          # Determine channel based on version string
          # If version contains a hyphen (e.g. 1.0.0-beta, 1.0.0-rc1), use the part after hyphen as channel
          # Otherwise, default to "default" (stable)
          if [[ "$VERSION" == *-* ]]; then
            CHANNEL=$(echo "$VERSION" | cut -d'-' -f2 | cut -d'.' -f1)
            echo "CHANNEL=$CHANNEL" >> $GITHUB_OUTPUT
          else
            echo "CHANNEL=default" >> $GITHUB_OUTPUT
          fi

      - name: Build Plugin
        run: ./gradlew buildPlugin -PpluginVersion=${{ steps.release_info.outputs.VERSION }} --no-daemon
        
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/distributions/*.zip

      - name: Publish Plugin to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}
        run: ./gradlew publishPlugin -PpluginVersion=${{ steps.release_info.outputs.VERSION }} -PpluginChannel=${{ steps.release_info.outputs.CHANNEL }} --no-daemon
